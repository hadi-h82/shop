<section class="product-detail">
  <div class="product-detail__container">
    @if (product(); as item) {
      <div class="product-detail__content">
        <!-- محتوای فعلی محصول -->
      </div>

      <div class="product-detail__image">
        <img [src]="item.imageUrl" [alt]="item.title" />
      </div>
    } @else {
      <div class="product-not-found">
        <span class="product-not-found__code">404</span>

        <h1>محصول پیدا نشد</h1>

        <p>
          محصولی که دنبالش هستید وجود ندارد یا از فروشگاه حذف شده است.
        </p>

        <div class="product-not-found__actions">
          <a mat-flat-button routerLink="/products">
            مشاهده محصولات
          </a>

          <a mat-button routerLink="/">
            بازگشت به صفحه اصلی
          </a>
        </div>
      </div>
    }
  </div>
</section>
