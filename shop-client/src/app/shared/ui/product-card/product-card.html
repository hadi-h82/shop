<article
  class="product-card"
  [class.product-card--unavailable]="!product().isAvailable"
>
  <img
    class="product-card__image"
    [src]="product().imageUrl"
    [alt]="product().title"
    loading="lazy"
  />

  @if (!product().isAvailable) {
    <span class="product-card__availability">
      ناموجود
    </span>
  }

  <div class="product-card__overlay">
    <div class="product-card__information">
      <span class="product-card__category">
        {{ product().categoryName }}
      </span>

      <h2 class="product-card__title">
        {{ product().title }}
      </h2>

      <div class="product-card__price">
        @if (product().discountPrice) {
          <span class="product-card__old-price">
            {{ product().price | number }}
            تومان
          </span>

          <strong>
            {{ product().discountPrice | number }}
            تومان
          </strong>
        } @else {
          <strong>
            {{ product().price | number }}
            تومان
          </strong>
        }
      </div>
    </div>

    <div class="product-card__actions">
      <a
        class="product-card__details-button"
        [routerLink]="['/products', product().slug]"
      >
        <mat-icon>visibility</mat-icon>
        <span>مشاهده جزئیات</span>
      </a>

      <button
        type="button"
        class="product-card__cart-button"
        [disabled]="!product().isAvailable"
        [attr.aria-label]="'افزودن ' + product().title + ' به سبد خرید'"
        (click)="addToCart()"
      >
        <mat-icon>shopping_cart</mat-icon>
      </button>
    </div>
  </div>
</article>
