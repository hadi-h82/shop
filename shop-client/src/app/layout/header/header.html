<header class="site-header">
  <div class="site-header__container">
    <a routerLink="/" class="site-header__logo">فروشگاه</a>

    <div class="site-header__search">
      <mat-icon>search</mat-icon>
      <input type="text" placeholder="جستجوی محصول..." />
    </div>

    <nav class="site-header__nav">
      <a routerLink="/">خانه</a>
      <a routerLink="/products">محصولات</a>
    </nav>

    <div class="site-header__actions">
      <a routerLink="/cart" class="site-header__cart" aria-label="سبد خرید">
        <span class="site-header__cart-icon">
          <mat-icon>shopping_cart</mat-icon>

          @if (cart.totalItems() > 0) {
          <span class="site-header__cart-badge">
            {{ cart.totalItems() }}
          </span>
          }
        </span>

        <span class="site-header__cart-text">سبد خرید</span>
      </a>

      <a mat-flat-button color="primary" routerLink="/login">
        ورود / ثبت‌نام
      </a>
    </div>
  </div>
</header>
